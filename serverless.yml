service: amplifolio-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.9
  region: eu-west-1  # Ireland for EU compliance
  stage: ${opt:stage, 'dev'}
  
  environment:
    STAGE: ${self:provider.stage}
    REGION: ${self:provider.region}
    
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - "arn:aws:dynamodb:${self:provider.region}:*:table/etf-data-${self:provider.stage}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/rl-portfolio-states-${self:provider.stage}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/portfolio-performance-${self:provider.stage}"
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource:
            - "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0"

functions:
  api:
    handler: api.main.handler
    timeout: 30
    memorySize: 1024
    events:
      - http:
          path: /{proxy+}
          method: ANY
          cors:
            origin: 'https://amplifolio.eu'
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
            allowCredentials: true

  etf-scraper:
    handler: api.data.etf_scraper.handler
    timeout: 900  # 15 minutes
    memorySize: 2048
    events:
      - schedule: cron(0 12 * * ? *)  # Daily at 12 PM UTC
    environment:
      ETF_DATA_BUCKET: etf-data-${self:provider.stage}

resources:
  Resources:
    # DynamoDB Tables
    EtfDataTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: etf-data-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: isin
            AttributeType: S
          - AttributeName: updated_at
            AttributeType: S
        KeySchema:
          - AttributeName: isin
            KeyType: HASH
          - AttributeName: updated_at
            KeyType: RANGE
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES

    RLStatesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: rl-portfolio-states-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: state_id
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: S
        KeySchema:
          - AttributeName: state_id
            KeyType: HASH
          - AttributeName: timestamp
            KeyType: RANGE

    PortfolioPerformanceTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: portfolio-performance-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: portfolio_id
            AttributeType: S
          - AttributeName: date
            AttributeType: S
        KeySchema:
          - AttributeName: portfolio_id
            KeyType: HASH
          - AttributeName: date
            KeyType: RANGE

    # S3 Bucket for ETF Data
    EtfDataBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: etf-data-${self:provider.stage}
        VersioningConfiguration:
          Status: Enabled
        LifecycleConfiguration:
          Rules:
            - Id: ArchiveOldData
              Status: Enabled
              Transitions:
                - TransitionInDays: 30
                  StorageClass: STANDARD_IA
                - TransitionInDays: 90
                  StorageClass: GLACIER

    # API Gateway Custom Domain
    ApiGatewayDomainName:
      Type: AWS::ApiGateway::DomainName
      Properties:
        DomainName: api.amplifolio.eu
        CertificateArn: ${env:SSL_CERTIFICATE_ARN}
        SecurityPolicy: TLS_1_2

    # CloudFront Distribution for API
    ApiCloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Aliases:
            - api.amplifolio.eu
          Origins:
            - Id: ApiGateway
              DomainName:
                Fn::Join:
                  - ""
                  - - Ref: RestApiApigEvent
                    - ".execute-api."
                    - ${self:provider.region}
                    - ".amazonaws.com"
              OriginPath: /${self:provider.stage}
              CustomOriginConfig:
                HTTPPort: 443
                OriginProtocolPolicy: https-only
          DefaultCacheBehavior:
            TargetOriginId: ApiGateway
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # CORS-S3Origin
          Enabled: true
          ViewerCertificate:
            AcmCertificateArn: ${env:SSL_CERTIFICATE_ARN}
            SslSupportMethod: sni-only

plugins:
  - serverless-python-requirements
  - serverless-offline

custom:
  pythonRequirements:
    dockerizePip: true
    slim: true
    strip: false