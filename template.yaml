AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: JustETF MCP Server - Remote MCP server on AWS Lambda with Web Adapter

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]

Globals:
  Function:
    Timeout: 30
    MemorySize: 512

Resources:
  McpFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Runtime: python3.13
      Handler: run.sh
      Architectures:
        - arm64
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerArm64:28
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_PORT: "8000"
          AWS_LWA_REMOVE_BASE_PATH: /prod
          AWS_LWA_READINESS_CHECK_PATH: /mcp
          AWS_LWA_READINESS_CHECK_MIN_UNHEALTHY_STATUS: 500
          MCP_TRANSPORT: streamable-http
      Events:
        McpEndpoint:
          Type: HttpApi
          Properties:
            Path: /mcp
            Method: ANY
            ApiId: !Ref McpApi

  McpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - GET
          - OPTIONS
          - DELETE
        AllowHeaders:
          - Content-Type
          - Authorization
          - Mcp-Session-Id

Outputs:
  McpEndpoint:
    Description: Remote MCP endpoint URL
    Value: !Sub "https://${McpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/mcp"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt McpFunction.Arn
